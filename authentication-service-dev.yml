# Authentication Service Configuration - Development Environment
# This file will be served by Config Server at:
# http://localhost:8888/authentication-service/dev

server:
  port: 8085
  servlet:
    context-path: /api

spring:
  application:
    name: authentication-service
  
  # Database Configuration (MySQL)
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/codetikki?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  
  # Security Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085
  
  # Other Spring Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Service Configuration
services:
  profile:
    url: http://localhost:8082/api
  employee:
    url: http://localhost:8083/api

# Logging Configuration
logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    com.codetikki.authentication: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  
  # Log File Configuration
  file:
    name: logs/authentication-service.log
    max-size: 10MB
    max-history: 10

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Spark Logging Configuration
spark:
  enabled: true
  endpoint: http://localhost:8080/api/logs
